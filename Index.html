
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lesson Plan Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #27ae60, #2c3e50);
            color: #333;
            line-height: 1.6;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background-color: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        header {
            background: linear-gradient(to right, #2c3e50, #27ae60);
            color: white;
            padding: 28px 20px;
            text-align: center;
        }

        h1 {
            font-size: 26px;
            font-weight: 600;
        }

        .subtitle {
            font-size: 15px;
            opacity: 0.9;
            margin-top: 6px;
        }

        .form-section {
            padding: 30px;
        }

        h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 20px;
            font-weight: 600;
        }

        .step {
            display: none;
        }

        .step.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            flex: 1;
            min-width: 250px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2d3748;
        }

        .required::after {
            content: " *";
            color: #e53e3e;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.25s ease;
            background-color: #fff;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #27ae60;
            box-shadow: 0 0 0 3px rgba(39, 174, 96, 0.15);
        }

        input[readonly] {
            background-color: #f7fafc;
            cursor: not-allowed;
            opacity: 0.8;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .price-info {
            background-color: #f0fdf4;
            border-left: 4px solid #27ae60;
            padding: 14px;
            border-radius: 8px;
            margin: 20px 0;
            text-align: center;
        }

        .price-value {
            font-size: 22px;
            font-weight: bold;
            color: #27ae60;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 25px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            text-align: center;
            display: inline-block;
        }

        .btn-primary {
            background-color: #27ae60;
            color: white;
        }

        .btn-primary:hover {
            background-color: #219a52;
        }

        .btn-secondary {
            background-color: #3498db;
            color: white;
        }

        .btn-secondary:hover {
            background-color: #2980b9;
        }

        .btn-outline {
            background-color: transparent;
            border: 2px solid #27ae60;
            color: #27ae60;
        }

        .btn-outline:hover {
            background-color: #e8f8f0;
        }

        .btn-disabled {
            background-color: #e2e8f0 !important;
            color: #a0aec0 !important;
            cursor: not-allowed !important;
            pointer-events: none;
        }

        @media (max-width: 600px) {
            .form-group {
                min-width: 100%;
            }
            .btn-group {
                flex-direction: column;
            }
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 English Lesson Plan Generator</h1>
            <p class="subtitle">Create your professional English teaching plan</p>
        </header>

        <div class="form-section">
            <!-- STEP 1 - Basic Information -->
            <div class="step active" id="step1">
                <h2>📋 School & Teacher Information</h2>

                <div class="form-row">
                    <div class="form-group">
                        <label for="escola" class="required">School Name</label>
                        <input type="text" id="escola" placeholder="e.g., EPC de Magoanine" required />
                    </div>
                    <div class="form-group">
                        <label for="professor" class="required">Teacher Name</label>
                        <input type="text" id="professor" placeholder="e.g., Maria João" required />
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="disciplina">Subject</label>
                        <input type="text" id="disciplina" value="English" readonly />
                    </div>
                    <div class="form-group">
                        <label for="classe">Grade / Class</label>
                        <select id="classe">
                            <option value="8th Grade">8th Grade</option>
                            <option value="9th Grade">9th Grade</option>
                            <option value="10th Grade">10th Grade</option>
                            <option value="11th Grade">11th Grade</option>
                            <option value="12th Grade">12th Grade</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="anoLectivo">Academic Year</label>
                        <input type="text" id="anoLectivo" placeholder="e.g., 2025-2026" />
                    </div>
                </div>

                <div class="btn-group">
                    <button class="btn btn-primary" id="nextBtn">Next →</button>
                </div>
            </div>

            <!-- STEP 2 - Finalize -->
            <div class="step" id="step2">
                <h2>📝 Finalize Your Lesson Plan</h2>

                <div class="form-row">
                    <div class="form-group">
                        <label for="dataGeracao">Generation Date</label>
                        <input type="text" id="dataGeracao" readonly />
                    </div>
                    <div class="form-group">
                        <label for="periodo">Period</label>
                        <select id="periodo">
                            <option value="">Select (optional)</option>
                            <option value="Morning">Morning</option>
                            <option value="Afternoon">Afternoon</option>
                            <option value="Evening">Evening</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="numAulas" class="required">Number of Lessons</label>
                        <select id="numAulas" required>
                            <option value="">Select number of lessons</option>
                            <option value="10">10 lessons (20 pages)</option>
                            <option value="20">20 lessons (40 pages)</option>
                            <option value="30">30 lessons (60 pages)</option>
                            <option value="40">40 lessons (80 pages)</option>
                            <option value="50">50 lessons (100 pages)</option>
                            <option value="60">60 lessons (120 pages)</option>
                        </select>
                    </div>
                </div>

                <!-- Wall Chart Option -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="muralAdicionado">Add Wall Chart?</label>
                        <select id="muralAdicionado">
                            <option value="0">No (+0 MZN)</option>
                            <option value="1">Yes (+5 MZN per lesson)</option>
                        </select>
                    </div>
                </div>

                <div class="price-info" id="priceInfo" style="display: none;">
                    <p>Total Amount:</p>
                    <div class="price-value" id="priceValue">0 MZN</div>
                </div>

                <div class="btn-group">
                    <button class="btn btn-outline" id="prevBtn">← Back</button>
                    <button class="btn btn-primary" id="generateBtn">Preview Sample</button>
                    <a href="#" class="btn btn-secondary disabled" id="pdfLink">Generate PDF</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // Set automatic date
            const today = new Date();
            const formattedDate = String(today.getDate()).padStart(2, '0') + '/' +
                                  String(today.getMonth() + 1).padStart(2, '0') + '/' +
                                  today.getFullYear();
            const dataGeracaoInput = document.getElementById('dataGeracao');
            if (dataGeracaoInput) {
                dataGeracaoInput.value = formattedDate;
            }

            // Set default academic year to current year
            const anoLectivoInput = document.getElementById('anoLectivo');
            if (anoLectivoInput && !anoLectivoInput.value) {
                const currentYear = today.getFullYear();
                anoLectivoInput.value = currentYear + '-' + (currentYear + 1);
            }

            // Elements
            const step1 = document.getElementById('step1');
            const step2 = document.getElementById('step2');
            const nextBtn = document.getElementById('nextBtn');
            const prevBtn = document.getElementById('prevBtn');
            const numAulasSelect = document.getElementById('numAulas');
            const muralAdicionadoSelect = document.getElementById('muralAdicionado');
            const priceInfo = document.getElementById('priceInfo');
            const priceValue = document.getElementById('priceValue');
            const pdfLink = document.getElementById('pdfLink');

            function goToStep2() {
                const escola = document.getElementById('escola')?.value?.trim() || '';
                const professor = document.getElementById('professor')?.value?.trim() || '';
                if (!escola || !professor) {
                    alert('Please fill in all required fields: School Name and Teacher Name.');
                    return;
                }
                step1.classList.remove('active');
                step2.classList.add('active');
            }

            function goToStep1() {
                step2.classList.remove('active');
                step1.classList.add('active');
            }

            if (nextBtn) nextBtn.addEventListener('click', e => { e.preventDefault(); goToStep2(); });
            if (prevBtn) prevBtn.addEventListener('click', e => { e.preventDefault(); goToStep1(); });

            function updatePrice() {
                const numAulas = parseInt(numAulasSelect.value);
                const muralAdicionado = document.getElementById('muralAdicionado')?.value === '1';
                
                if (numAulas) {
                    // Base price: 12 MZN per 10 lessons
                    let total = Math.ceil(numAulas / 10) * 12;
                    
                    // Add wall chart if selected
                    if (muralAdicionado) {
                        total += numAulas * 5;
                    }
                    
                    priceValue.textContent = total + ' MZN';
                    priceInfo.style.display = 'block';
                    return total;
                } else {
                    priceInfo.style.display = 'none';
                    return 0;
                }
            }

            if (numAulasSelect) {
                numAulasSelect.addEventListener('change', function () {
                    updatePrice();
                    updatePdfLink();
                });
            }

            if (muralAdicionadoSelect) {
                muralAdicionadoSelect.addEventListener('change', function () {
                    updatePrice();
                    updatePdfLink();
                });
            }

            function getFormData() {
                const numAulas = document.getElementById('numAulas')?.value || '';
                const muralAdicionado = document.getElementById('muralAdicionado')?.value === '1' ? '1' : '0';
                const valorTotal = updatePrice();
                
                // Format classe values to match what PDF expects
                let classe = document.getElementById('classe')?.value || '';
                // Convert English grades back to Portuguese format if needed
                if (classe === '8th Grade') classe = '8ª Classe';
                else if (classe === '9th Grade') classe = '9ª Classe';
                else if (classe === '10th Grade') classe = '10ª Classe';
                else if (classe === '11th Grade') classe = '11ª Classe';
                else if (classe === '12th Grade') classe = '12ª Classe';
                
                return {
                    escola: document.getElementById('escola')?.value?.trim() || '',
                    professor: document.getElementById('professor')?.value?.trim() || '',
                    disciplina: 'English',
                    classe: classe,
                    anoLectivo: document.getElementById('anoLectivo')?.value?.trim() || '',
                    numAulas: numAulas,
                    periodo: document.getElementById('periodo')?.value || '',
                    dataGeracao: document.getElementById('dataGeracao')?.value || '',
                    muralAdicionado: muralAdicionado,
                    valorTotal: valorTotal
                };
            }

            function updatePdfLink() {
                const data = getFormData();
                if (data.escola && data.professor && data.numAulas) {
                    const params = new URLSearchParams(data).toString();
                    if (pdfLink) {
                        // Link para o arquivo PDF em inglês (renomeie para pdf-english.html)
                        pdfLink.href = `pdf-english.html?${params}`;
                        pdfLink.classList.remove('disabled');
                    }
                } else {
                    if (pdfLink) {
                        pdfLink.href = '#';
                        pdfLink.classList.add('disabled');
                    }
                }
            }

            const fieldIds = ['escola', 'professor', 'classe', 'anoLectivo', 'periodo'];
            fieldIds.forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    el.addEventListener('input', updatePdfLink);
                    el.addEventListener('change', updatePdfLink);
                }
            });

            const generateBtn = document.getElementById('generateBtn');
            if (generateBtn) {
                generateBtn.addEventListener('click', function (e) {
                    e.preventDefault();
                    const data = getFormData();
                    if (!data.escola || !data.professor || !data.numAulas) {
                        alert('Please fill in all required fields before preview.');
                        return;
                    }
                    // Replace with your actual sample link
                    window.open('https://drive.google.com/file/d/1xampleEnglishLessonPlan/view?usp=drivesdk', '_blank');
                });
            }

            updatePdfLink();
        });
    </script>
</body>
</html>
