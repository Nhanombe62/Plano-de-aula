<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plano de Aula MZ - Login com Google</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
        }

        .tela {
            display: none;
        }

        .tela.ativa {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 35px 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
            font-size: 24px;
        }

        .logo {
            text-align: center;
            margin-bottom: 20px;
            font-size: 48px;
        }

        .campo {
            margin-bottom: 18px;
        }

        .campo label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
            font-size: 14px;
        }

        .campo input, .campo select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .campo input:focus, .campo select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        button:hover {
            transform: scale(1.02);
        }

        .btn-google {
            background: white;
            color: #333;
            border: 2px solid #ddd;
        }

        .btn-google:hover {
            background: #f8f9fa;
        }

        .btn-sair {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            margin-top: 20px;
        }

        .info-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
        }

        .info-card p {
            margin: 10px 0;
            color: #555;
        }

        .info-card strong {
            color: #333;
        }

        hr {
            margin: 15px 0;
            border: none;
            border-top: 1px solid #eee;
        }

        .avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        
        <!-- TELA DE LOGIN COM GOOGLE -->
        <div id="telaLogin" class="tela ativa">
            <div class="card">
                <div class="logo">📚</div>
                <h2>Plano de Aula MZ</h2>
                
                <button id="btnGoogle" class="btn-google" onclick="loginComGoogle()">
                    <img src="https://www.google.com/favicon.ico" width="20" height="20" style="border-radius: 50%;">
                    Selecionar conta Google
                </button>
                
                <p style="text-align: center; margin-top: 20px; color: #666; font-size: 13px;">
                    Ao clicar, você seleciona um email<br>já salvo no seu celular
                </p>
                
                <div id="erroLogin" class="erro" style="color: red; text-align: center; margin-top: 15px;"></div>
            </div>
        </div>

        <!-- TELA DE CADASTRO (primeiro acesso) -->
        <div id="telaCadastro" class="tela">
            <div class="card">
                <div class="logo">📝</div>
                <h2>Complete seu cadastro</h2>
                
                <div class="info-card" style="background: #e3f2fd; text-align: center;">
                    <p>✅ Conta Google selecionada:</p>
                    <p><strong id="emailSelecionado"></strong></p>
                </div>
                
                <div class="campo">
                    <label>🏫 Nome da Escola</label>
                    <input type="text" id="nomeEscola" placeholder="Ex: Escola Primária da Cidade">
                </div>
                
                <div class="campo">
                    <label>📱 Participar do grupo de WhatsApp?</label>
                    <div class="radio-group" style="display: flex; gap: 20px; margin-top: 8px;">
                        <label style="display: flex; align-items: center; gap: 5px;">
                            <input type="radio" name="whatsapp" value="sim"> ✅ Sim
                        </label>
                        <label style="display: flex; align-items: center; gap: 5px;">
                            <input type="radio" name="whatsapp" value="nao" checked> ❌ Não
                        </label>
                    </div>
                </div>
                
                <button onclick="completarCadastro()">💾 Salvar e Entrar</button>
                
                <div id="erroCadastro" class="erro"></div>
            </div>
        </div>

        <!-- TELA PRINCIPAL (DASHBOARD) -->
        <div id="telaDashboard" class="tela">
            <div class="card">
                <div class="logo">🎉</div>
                <h2>Bem-vindo(a)!</h2>
                
                <img id="userAvatar" class="avatar" src="" style="display: none;">
                
                <div class="info-card">
                    <p>📧 <strong>Email:</strong> <span id="userEmail"></span></p>
                    <p>🏫 <strong>Escola:</strong> <span id="userEscola"></span></p>
                    <p>📱 <strong>WhatsApp:</strong> <span id="userWhatsapp"></span></p>
                    <hr>
                    <p>📅 <strong>Cadastro:</strong> <span id="userData"></span></p>
                </div>
                
                <button onclick="sair()" class="btn-sair">🚪 Sair</button>
            </div>
        </div>

    </div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <script>
        // ============================================
        // BANCO DE DADOS LOCAL
        // ============================================
        
        function getUsuarios() {
            const usuarios = localStorage.getItem('usuarios_google');
            return usuarios ? JSON.parse(usuarios) : [];
        }
        
        function salvarUsuarios(usuarios) {
            localStorage.setItem('usuarios_google', JSON.stringify(usuarios));
        }
        
        function getUsuarioLogado() {
            const logado = localStorage.getItem('usuario_google_logado');
            return logado ? JSON.parse(logado) : null;
        }
        
        function setUsuarioLogado(usuario) {
            localStorage.setItem('usuario_google_logado', JSON.stringify(usuario));
        }
        
        function limparUsuarioLogado() {
            localStorage.removeItem('usuario_google_logado');
        }
        
        let googleUserData = null;
        
        // ============================================
        // LOGIN COM GOOGLE (seleciona email do celular)
        // ============================================
        
        function loginComGoogle() {
            // Inicializar Google One Tap
            google.accounts.id.initialize({
                client_id: 'SEU_CLIENT_ID_GOOGLE.apps.googleusercontent.com', // Você precisa criar no Google Cloud Console
                callback: handleGoogleCredential
            });
            
            // Mostrar seletor de contas
            google.accounts.id.prompt();
        }
        
        function handleGoogleCredential(response) {
            // Decodificar o token do Google
            const payload = parseJwt(response.credential);
            
            googleUserData = {
                email: payload.email,
                nome: payload.name,
                avatar: payload.picture
            };
            
            // Verificar se usuário já existe
            const usuarios = getUsuarios();
            const usuarioExistente = usuarios.find(u => u.email === googleUserData.email);
            
            if (usuarioExistente) {
                // Usuário já cadastrado -> fazer login
                setUsuarioLogado(usuarioExistente);
                mostrarDashboard(usuarioExistente);
            } else {
                // Novo usuário -> mostrar tela de cadastro
                document.getElementById('emailSelecionado').textContent = googleUserData.email;
                mostrarTela('telaCadastro');
            }
        }
        
        // Função para decodificar JWT
        function parseJwt(token) {
            const base64Url = token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        }
        
        // ============================================
        // COMPLETAR CADASTRO (primeiro acesso)
        // ============================================
        
        function completarCadastro() {
            const escola = document.getElementById('nomeEscola').value.trim();
            const whatsapp = document.querySelector('input[name="whatsapp"]:checked').value;
            const erroDiv = document.getElementById('erroCadastro');
            
            erroDiv.textContent = '';
            
            if (!escola) {
                erroDiv.textContent = '❌ Digite o nome da escola';
                return;
            }
            
            const novoUsuario = {
                email: googleUserData.email,
                nome: googleUserData.nome,
                avatar: googleUserData.avatar,
                escola: escola,
                whatsapp: whatsapp === 'sim' ? '✅ Sim, quer receber novidades' : '❌ Não',
                dataCadastro: new Date().toLocaleDateString('pt-BR'),
                horaCadastro: new Date().toLocaleTimeString('pt-BR')
            };
            
            const usuarios = getUsuarios();
            usuarios.push(novoUsuario);
            salvarUsuarios(usuarios);
            
            setUsuarioLogado(novoUsuario);
            mostrarDashboard(novoUsuario);
        }
        
        // ============================================
        // MOSTRAR DASHBOARD
        // ============================================
        
        function mostrarDashboard(usuario) {
            document.getElementById('userEmail').textContent = usuario.email;
            document.getElementById('userEscola').textContent = usuario.escola;
            document.getElementById('userWhatsapp').textContent = usuario.whatsapp;
            document.getElementById('userData').textContent = `${usuario.dataCadastro} às ${usuario.horaCadastro}`;
            
            if (usuario.avatar) {
                const avatar = document.getElementById('userAvatar');
                avatar.src = usuario.avatar;
                avatar.style.display = 'block';
            }
            
            mostrarTela('telaDashboard');
        }
        
        // ============================================
        // FUNÇÕES AUXILIARES
        // ============================================
        
        function mostrarTela(id) {
            document.querySelectorAll('.tela').forEach(tela => {
                tela.classList.remove('ativa');
            });
            document.getElementById(id).classList.add('ativa');
        }
        
        function sair() {
            limparUsuarioLogado();
            googleUserData = null;
            mostrarTela('telaLogin');
        }
        
        function verificarSessao() {
            const usuario = getUsuarioLogado();
            if (usuario) {
                mostrarDashboard(usuario);
            }
        }
        
        // Versão alternativa SEM necessidade de CLIENT_ID (demo)
        // Esta versão simula a seleção de email do celular com um seletor
        function loginComGoogleSimulado() {
            // Simula emails salvos no celular
            const emailsSalvos = [
                "professor@gmail.com",
                "escola@escola.com", 
                "diretor@escola.mz",
                "coordenador@gmail.com"
            ];
            
            // Criar seletor visual
            const card = document.querySelector('#telaLogin .card');
            const btnGoogle = document.getElementById('btnGoogle');
            
            const selectorDiv = document.createElement('div');
            selectorDiv.className = 'email-selector';
            selectorDiv.style.marginTop = '20px';
            selectorDiv.innerHTML = '<p style="margin-bottom: 10px; color:#555;">📱 Selecione um email:</p>';
            
            emailsSalvos.forEach(email => {
                const btn = document.createElement('button');
                btn.textContent = email;
                btn.style.background = '#f0f0f0';
                btn.style.color = '#333';
                btn.style.marginBottom = '8px';
                btn.style.border = '1px solid #ddd';
                btn.onclick = () => {
                    googleUserData = {
                        email: email,
                        nome: email.split('@')[0],
                        avatar: null
                    };
                    
                    const usuarios = getUsuarios();
                    const usuarioExistente = usuarios.find(u => u.email === email);
                    
                    if (usuarioExistente) {
                        setUsuarioLogado(usuarioExistente);
                        mostrarDashboard(usuarioExistente);
                    } else {
                        document.getElementById('emailSelecionado').textContent = email;
                        mostrarTela('telaCadastro');
                    }
                    
                    selectorDiv.remove();
                    btnGoogle.style.display = 'flex';
                };
                selectorDiv.appendChild(btn);
            });
            
            btnGoogle.style.display = 'none';
            card.appendChild(selectorDiv);
        }
        
        // Trocar para versão simulada se não tiver Client ID
        // Descomente a linha abaixo para usar a versão simulada
        // window.loginComGoogle = loginComGoogleSimulado;
        
        verificarSessao();
    </script>
</body>
</html>
