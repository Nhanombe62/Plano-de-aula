<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Caderno</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* FORMULÁRIO */
.formulario {
    padding: 20px;
    background: #f0f0f0;
    text-align: center;
}

.formulario input {
    padding: 8px;
    margin: 5px;
    width: 200px;
}

button {
    padding: 10px 20px;
    cursor: pointer;
}

/* ÁREA PDF */
#areaPDF {
    width: 1123px;
}

/* CAPA */
.capa {
    width: 1123px;
    height: 794px;
    background-image: url('capa.png');
    background-size: cover;
    background-position: center;
    position: relative;
}

.dados {
    position: absolute;
    top: 320px;
    left: 180px;
    font-size: 22px;
    font-weight: bold;
}

/* OUTRAS PÁGINAS */
.pagina {
    width: 1123px;
    height: 794px;
    padding: 60px;
    box-sizing: border-box;
    page-break-before: always;
}

h1 {
    text-align: center;
}

p {
    text-align: justify;
}
</style>
</head>

<body>

<div class="formulario">
    <input type="text" id="inputEscola" placeholder="Nome da Escola">
    <input type="text" id="inputClasse" placeholder="Classe">
    <input type="text" id="inputDisciplina" placeholder="Disciplina">
    <br><br>
    <button onclick="baixarPDF()">Baixar PDF</button>
</div>

<div id="areaPDF">

    <div class="capa">
        <div class="dados">
            <p>Escola: <span id="escola"></span></p>
            <p>Classe: <span id="classe"></span></p>
            <p>Disciplina: <span id="disciplina"></span></p>
        </div>
    </div>

    <div class="pagina">
        <h1>Breve História de Moçambique</h1>
        <p>
        Moçambique é um país localizado no sudeste da África...
        </p>
        <p>
        A independência foi proclamada em 25 de Junho de 1975.
        </p>
    </div>

    <div class="pagina">
        <h1>Moçambique Pós-Independência</h1>
        <p>
        Após a independência, o país enfrentou desafios...
        </p>
    </div>

</div>

<script>
function baixarPDF() {

    // Preencher dados
    document.getElementById("escola").innerText =
        document.getElementById("inputEscola").value;

    document.getElementById("classe").innerText =
        document.getElementById("inputClasse").value;

    document.getElementById("disciplina").innerText =
        document.getElementById("inputDisciplina").value;

    const elemento = document.getElementById("areaPDF");

    const opt = {
        margin: 0,
        filename: 'Caderno.pdf',
        image: { type: 'jpeg', quality: 1 },
        html2canvas: { scale: 2 },
        jsPDF: { unit: 'px', format: [1123, 794], orientation: 'landscape' }
    };

    html2pdf().set(opt).from(elemento).save();
}
</script>

</body>
</html>
