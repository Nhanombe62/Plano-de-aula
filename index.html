<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Plano de Aula MZ</title>
    
    <!-- PWA manifest -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#667eea">
    
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <!-- Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAs22PW1BKUZ1ssA8deoDl-5Pja7fU6ws4",
            authDomain: "plano-de-aula-mz.firebaseapp.com",
            projectId: "plano-de-aula-mz",
            storageBucket: "plano-de-aula-mz.firebasestorage.app",
            messagingSenderId: "358746865109",
            appId: "1:358746865109:web:73432a853fee98aaf7515c",
            measurementId: "G-QS6FJZLHLF"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        window.auth = auth;
        window.db = db;
        window.provider = provider;
        window.signInWithPopup = signInWithPopup;
        window.signOut = signOut;
        window.doc = doc;
        window.setDoc = setDoc;
        window.getDoc = getDoc;
    </script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container { width: 100%; max-width: 450px; }
        .tela { display: none; }
        .tela.ativa { display: block; animation: fade 0.3s; }
        @keyframes fade {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .card {
            background: white;
            border-radius: 28px;
            padding: 40px 25px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .logo { font-size: 64px; margin-bottom: 15px; }
        h2 { font-size: 24px; margin-bottom: 8px; color: #333; }
        .subtitulo { color: #666; margin-bottom: 30px; font-size: 14px; }
        .btn-google {
            background: white;
            color: #333;
            border: 2px solid #e0e0e0;
            border-radius: 100px;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            margin-top: 10px;
            transition: all 0.2s;
        }
        .btn-google:hover {
            background: #f8f9fa;
            border-color: #667eea;
        }
        .info-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 20px;
            margin: 20px 0;
            text-align: left;
        }
        .info-card p { margin: 10px 0; color: #555; }
        .info-card strong { color: #333; }
        hr { margin: 15px 0; border: none; border-top: 1px solid #eee; }
        .btn-sair {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: white;
            border: none;
            border-radius: 100px;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        .campo { margin-bottom: 18px; text-align: left; }
        .campo label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; }
        .campo input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 14px;
            font-size: 16px;
        }
        .campo input:focus { outline: none; border-color: #667eea; }
        .radio-group { display: flex; gap: 20px; margin-top: 8px; }
        .radio-group label { display: flex; align-items: center; gap: 8px; cursor: pointer; font-weight: normal; }
        .erro { color: #e74c3c; text-align: center; margin-top: 12px; font-size: 13px; }
        .sucesso { color: #27ae60; text-align: center; margin-top: 12px; font-size: 13px; }
        .dica {
            background: #e3f2fd;
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 20px;
            font-size: 13px;
            text-align: center;
            border-left: 4px solid #2196f3;
        }
    </style>
</head>
<body>
    <div class="container">
        
        <!-- TELA DE LOGIN -->
        <div id="telaLogin" class="tela ativa">
            <div class="card">
                <div class="logo">📚</div>
                <h2>Plano de Aula MZ</h2>
                <p class="subtitulo">Acesse com sua conta Google</p>
                
                <div class="dica">
                    🔐 <strong>Login seguro e rápido</strong><br>
                    Selecione sua conta - sem digitar senha!
                </div>
                
                <button class="btn-google" onclick="loginComGoogle()">
                    <svg width="20" height="20" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Entrar com Google
                </button>
                
                <div id="erroLogin" class="erro"></div>
            </div>
        </div>

        <!-- TELA DE CADASTRO (complementar) -->
        <div id="telaCadastro" class="tela">
            <div class="card">
                <div class="logo">📝</div>
                <h2>Complete seu cadastro</h2>
                
                <div class="info-card" style="background: #e3f2fd;">
                    <p>✅ <strong>Conta Google selecionada:</strong></p>
                    <p><strong id="emailSelecionado"></strong></p>
                </div>
                
                <div class="campo">
                    <label>🏫 Nome da Escola</label>
                    <input type="text" id="nomeEscola" placeholder="Ex: Escola Primária da Cidade">
                </div>
                
                <div class="campo">
                    <label>📱 Participar do grupo de WhatsApp?</label>
                    <div class="radio-group">
                        <label><input type="radio" name="whatsapp" value="sim"> ✅ Sim</label>
                        <label><input type="radio" name="whatsapp" value="nao" checked> ❌ Não</label>
                    </div>
                </div>
                
                <button class="btn-google" onclick="completarCadastro()" style="background: #667eea; color: white;">
                    Salvar e Entrar
                </button>
                
                <div id="erroCadastro" class="erro"></div>
            </div>
        </div>

        <!-- TELA PRINCIPAL -->
        <div id="telaDashboard" class="tela">
            <div class="card">
                <div class="logo">🎉</div>
                <h2>Bem-vindo!</h2>
                
                <div class="info-card">
                    <p>📧 <strong>Email:</strong> <span id="userEmail"></span></p>
                    <p>👤 <strong>Nome:</strong> <span id="userNome"></span></p>
                    <p>🏫 <strong>Escola:</strong> <span id="userEscola"></span></p>
                    <p>📱 <strong>WhatsApp:</strong> <span id="userWhatsapp"></span></p>
                    <hr>
                    <p>📅 <strong>Cadastro:</strong> <span id="userData"></span></p>
                </div>
                
                <button onclick="sair()" class="btn-sair">🚪 Sair</button>
                
                <div id="infoDashboard" class="sucesso"></div>
            </div>
        </div>

    </div>

    <script>
        let usuarioGoogle = null;
        
        function mostrarTela(id) {
            document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
            document.getElementById(id).classList.add('ativa');
        }
        
        // ============================================
        // LOGIN COM GOOGLE (CONTA REAL)
        // ============================================
        
        async function loginComGoogle() {
            const erroDiv = document.getElementById('erroLogin');
            erroDiv.textContent = '';
            
            try {
                const result = await window.signInWithPopup(window.auth, window.provider);
                const user = result.user;
                
                usuarioGoogle = {
                    uid: user.uid,
                    email: user.email,
                    nome: user.displayName,
                    foto: user.photoURL
                };
                
                // Verificar se já existe no Firestore
                const userDocRef = window.doc(window.db, 'usuarios', user.uid);
                const userDoc = await window.getDoc(userDocRef);
                
                if (userDoc.exists()) {
                    // Usuário já cadastrado
                    const userData = userDoc.data();
                    mostrarDashboard(user, userData);
                } else {
                    // Novo usuário - pedir dados complementares
                    document.getElementById('emailSelecionado').textContent = user.email;
                    mostrarTela('telaCadastro');
                }
                
            } catch (error) {
                console.error(error);
                erroDiv.textContent = `❌ Erro: ${error.message}`;
            }
        }
        
        // ============================================
        // COMPLETAR CADASTRO
        // ============================================
        
        async function completarCadastro() {
            const escola = document.getElementById('nomeEscola').value.trim();
            const whatsapp = document.querySelector('input[name="whatsapp"]:checked').value;
            const erroDiv = document.getElementById('erroCadastro');
            
            if (!escola) {
                erroDiv.textContent = '❌ Digite o nome da escola';
                return;
            }
            
            try {
                const userData = {
                    email: usuarioGoogle.email,
                    nome: usuarioGoogle.nome,
                    escola: escola,
                    whatsapp: whatsapp === 'sim' ? '✅ Sim, quer receber novidades' : '❌ Não, obrigado',
                    dataCadastro: new Date().toLocaleDateString('pt-BR'),
                    horaCadastro: new Date().toLocaleTimeString('pt-BR'),
                    uid: usuarioGoogle.uid,
                    foto: usuarioGoogle.foto
                };
                
                const userDocRef = window.doc(window.db, 'usuarios', usuarioGoogle.uid);
                await window.setDoc(userDocRef, userData);
                
                // Pegar o usuário atual do auth
                const user = window.auth.currentUser;
                mostrarDashboard(user, userData);
                
                document.getElementById('nomeEscola').value = '';
                
            } catch (error) {
                erroDiv.textContent = `❌ Erro: ${error.message}`;
            }
        }
        
        // ============================================
        // DASHBOARD
        // ============================================
        
        function mostrarDashboard(user, userData) {
            document.getElementById('userEmail').textContent = user.email;
            document.getElementById('userNome').textContent = userData.nome || user.displayName || 'Usuário';
            document.getElementById('userEscola').textContent = userData.escola || 'Não informado';
            document.getElementById('userWhatsapp').textContent = userData.whatsapp || '❌ Não';
            document.getElementById('userData').textContent = userData.dataCadastro || new Date().toLocaleDateString('pt-BR');
            mostrarTela('telaDashboard');
        }
        
        // ============================================
        // SAIR
        // ============================================
        
        async function sair() {
            try {
                await window.signOut(window.auth);
                usuarioGoogle = null;
                mostrarTela('telaLogin');
            } catch (error) {
                console.error(error);
            }
        }
        
        // ============================================
        // VERIFICAR SESSÃO
        // ============================================
        
        window.auth.onAuthStateChanged(async (user) => {
            if (user) {
                const userDocRef = window.doc(window.db, 'usuarios', user.uid);
                const userDoc = await window.getDoc(userDocRef);
                if (userDoc.exists()) {
                    mostrarDashboard(user, userDoc.data());
                } else {
                    usuarioGoogle = {
                        uid: user.uid,
                        email: user.email,
                        nome: user.displayName,
                        foto: user.photoURL
                    };
                    document.getElementById('emailSelecionado').textContent = user.email;
                    mostrarTela('telaCadastro');
                }
            }
        });
    </script>
</body>
</html>
