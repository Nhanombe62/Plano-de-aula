<!DOCTYPE html>
<html lang="pt-mz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Permuta de Professores - Moçambique</title>
    <style>
        :root {
            --primary: #009688;
            --secondary: #f39c12;
            --accent: #e74c3c;
            --dark: #2c3e50;
            --light: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light);
            margin: 0;
            padding: 0;
            color: #333;
        }

        header {
            background: linear-gradient(135deg, var(--primary), #00695c);
            color: white;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        header h1 { margin: 0; font-size: 1.5em; }
        header p { margin: 5px 0 0; opacity: 0.8; font-size: 0.9em; }

        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 20px;
        }

        /* TELAS (Views) */
        .view { display: none; animation: fadeIn 0.4s ease; }
        .view.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* MENU INICIAL */        .menu-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-top: 50px;
        }

        .menu-btn {
            background: white;
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 30px;
            border-radius: 12px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .menu-btn:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }

        .menu-btn.secondary {
            border-color: var(--secondary);
            color: var(--secondary);
        }
        .menu-btn.secondary:hover {
            background: var(--secondary);
            color: white;
        }

        /* FORMULÁRIO E LISTA */
        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .btn-back {
            background: transparent;            color: #666;
            border: 1px solid #ccc;
            padding: 8px 15px;
            width: auto;
            display: inline-block;
            margin-bottom: 20px;
            font-size: 0.9em;
            cursor: pointer;
        }
        .btn-back:hover { background: #eee; color: #333; }

        h2 { border-bottom: 2px solid var(--light); padding-bottom: 10px; color: var(--dark); margin-top: 0;}
        h3 { margin-top: 0; color: var(--dark); }

        .form-group { margin-bottom: 15px; }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }

        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9em; }
        input, select, textarea {
            width: 100%; padding: 12px; border: 1px solid #ccc;
            border-radius: 6px; box-sizing: border-box; font-size: 14px;
            background-color: #fff;
        }
        input:focus, select:focus { border-color: var(--primary); outline: none; }
        select:disabled { background-color: #e9ecef; cursor: not-allowed; }

        .btn-submit {
            background-color: var(--primary); color: white; border: none;
            padding: 15px; width: 100%; font-size: 16px; font-weight: bold;
            border-radius: 6px; cursor: pointer; margin-top: 10px;
        }
        .btn-submit:hover { background-color: #00796b; }

        /* FILTRO DE PESQUISA */
        .search-box {
            background: #e8f6f3;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #b2dfdb;
        }
        .search-box label { color: var(--primary); font-size: 1.1em; }
        .search-box select { font-size: 1.1em; font-weight: bold; border-color: var(--primary); }

        /* LISTA DE PERMUTAS */        .teacher-item {
            background: #f9f9f9; border-left: 5px solid var(--secondary);
            padding: 15px; margin-bottom: 15px; border-radius: 6px;
        }
        .teacher-item h3 { margin: 0 0 10px 0; display: flex; justify-content: space-between; }
        .tag { background: var(--dark); color: white; padding: 3px 8px; border-radius: 4px; font-size: 0.8em; }
        
        .no-results {
            text-align: center;
            padding: 40px;
            color: #777;
            background: #eee;
            border-radius: 8px;
        }

        .hidden { display: none; }
        .reset-btn {
            background: var(--accent); color: white; border: none;
            padding: 10px; width: 100%; margin-top: 20px;
            border-radius: 6px; cursor: pointer;
        }
        
        /* RADIO BUTTONS PARA LOCALIZAÇÃO */
        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }
        .radio-option {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .radio-option input[type="radio"] {
            width: auto;
            margin: 0;
        }

    </style>
</head>
<body>

    <header>
        <h1>🇲🇿 Portal de Permuta</h1>
        <p>Sistema Nacional de Trocas de Posto de Trabalho</p>
    </header>

    <div class="container">
        <!-- TELA 1: MENU PRINCIPAL -->
        <div id="view-home" class="view active">
            <div class="menu-grid">
                <button class="menu-btn" onclick="showView('view-form')">
                    <span>📝</span> Registar Permuta
                </button>
                <button class="menu-btn secondary" onclick="showView('view-list')">
                    <span>🔍</span> Pedidos Disponíveis
                </button>
            </div>
        </div>

        <!-- TELA 2: FORMULÁRIO DE REGISTO -->
        <div id="view-form" class="view">
            <button class="btn-back" onclick="showView('view-home')">← Voltar ao Menu</button>
            
            <div class="card">
                <h2>Novo Pedido de Permuta</h2>
                <form id="permutaForm">
                    <div class="form-group">
                        <label>Nome Completo:</label>
                        <input type="text" id="nome" required placeholder="Ex: João Manuel">
                    </div>

                    <div class="form-group">
                        <label>Nível de Ensino:</label>
                        <select id="nivel" required>
                            <option value="" disabled selected>Selecione...</option>
                            <option value="DN1">DN1</option>
                            <option value="DN2">DN2</option>
                            <option value="DN3">DN3</option>
                            <option value="DN4">DN4</option>
                        </select>
                    </div>

                    <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
                    <h3>📍 Localização Actual</h3>

                    <div class="form-group">
                        <label>Província onde trabalha:</label>
                        <select id="provAtual" required onchange="carregarDistritosAtuais()">
                            <option value="" disabled selected>Selecione a Província...</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Distrito onde trabalha:</label>
                        <select id="distritoAtual" required disabled onchange="habilitarLocalizacao()">
                            <option value="" disabled selected>Selecione a Província primeiro...</option>
                        </select>                    </div>

                    <div class="form-group">
                        <label>Localização da Escola:</label>
                        <div class="radio-group">
                            <label class="radio-option">
                                <input type="radio" name="localizacao" value="Dentro da Vila" id="radioDentro" disabled onchange="toggleDistancia()">
                                Dentro da Vila
                            </label>
                            <label class="radio-option">
                                <input type="radio" name="localizacao" value="Fora da Vila" id="radioFora" disabled onchange="toggleDistancia()">
                                Fora da Vila
                            </label>
                        </div>
                    </div>

                    <div class="form-group hidden" id="distanciaGroup">
                        <label>Quantos KM da vila para sua escola actual?</label>
                        <input type="number" id="distancia" placeholder="Ex: 45">
                    </div>

                    <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
                    <h3>🚀 Destino Pretendido</h3>

                    <div class="form-group">
                        <label>Para qual Província pretende ir?</label>
                        <select id="provDestino" required onchange="carregarDistritosDestino()">
                            <option value="" disabled selected>Selecione a Província...</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Para qual Distrito pretende ir?</label>
                        <select id="distDestino" required disabled>
                            <option value="" disabled selected>Selecione a Província primeiro...</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Condições Especiais:</label>
                        <textarea id="condicoes" rows="2" placeholder="Ex: Só aceito se tiver casa..."></textarea>
                    </div>

                    <div class="form-group">
                        <label>Seu Contacto:</label>
                        <input type="tel" id="telefone" required placeholder="84/85 XXX XXXX">
                    </div>

                    <button type="submit" class="btn-submit">Verificar Compatibilidade e Registar</button>
                </form>            </div>
        </div>

        <!-- TELA 3: LISTA DE PEDIDOS (COM FILTRO) -->
        <div id="view-list" class="view">
            <button class="btn-back" onclick="showView('view-home')">← Voltar ao Menu</button>
            
            <div class="card">
                <h2>🔍 Procurar Permutas</h2>
                
                <div class="search-box">
                    <label for="filtroProvincia">1. Selecione a Província de Destino:</label>
                    <select id="filtroProvincia" onchange="filtrarLista()">
                        <option value="" disabled selected>Selecione para ver resultados...</option>
                    </select>
                    <p style="font-size: 0.8em; margin-top: 5px; color: #666;">
                        *Mostraremos apenas professores que querem ir para esta província.
                    </p>
                </div>

                <div id="resultadosArea">
                    <div class="no-results">
                        👆 Selecione uma província acima para ver os pedidos disponíveis.
                    </div>
                </div>

                <button class="reset-btn" onclick="limparDados()">Resetar Sistema (Apagar Tudo)</button>
            </div>
        </div>

    </div>

    <script>
        // --- DADOS COMPLETOS DE MOÇAMBIQUE ---
        const provinciasMoz = [
            "Maputo Cidade", "Maputo Província", "Gaza", "Inhambane", 
            "Sofala", "Manica", "Tete", "Zambézia", "Nampula", 
            "Cabo Delgado", "Niassa"
        ];

        const distritosPorProvincia = {
            "Maputo Cidade": ["Maputo Cidade"],
            "Maputo Província": ["Matola", "Boane", "Marracuene", "Manhiça", "Magude", "Moamba", "Namaacha", "Matutuíne"],
            "Gaza": ["Xai-Xai", "Chokwé", "Bilene", "Chibuto", "Guijá", "Mapai", "Mabalane", "Manjacaze", "Massangena"],
            "Inhambane": ["Inhambane", "Maxixe", "Vilanculos", "Massinga", "Zavala", "Jangamo", "Morrumbene", "Panda", "Funhalouro", "Inharrime", "Mabote"],
            "Sofala": ["Beira", "Dondo", "Gorongosa", "Búzi", "Machanga", "Muanza", "Nhamatanda", "Chemba", "Caia", "Marromeu", "Cheringoma"],
            "Manica": ["Chimoio", "Manica", "Sussundenga", "Macossa", "Gondola", "Mossurize", "Báruè", "Machaze"],
            "Tete": ["Tete", "Moatize", "Cahora Bassa", "Changara", "Macanga", "Marávia", "Tsangano", "Zumbo", "Chiuta", "Dôa", "Magoé", "Mutarara"],
            "Zambézia": ["Quelimane", "Chinde", "Maganja da Costa", "Morrumbala", "Alto Molócuè", "Gile", "Milange", "Nicoadala", "Gurué", "Mopeia", "Namacurra", "Pebane"],
            "Nampula": ["Nampula", "Ilha de Moçambique", "Nacala", "Mossuril", "Ribaué", "Muecate", "Monapo", "Lalaua", "Mecubúri", "Memba", "Eráti", "Malema", "Nacarôa"],            "Cabo Delgado": ["Pemba", "Montepuez", "Mocímboa da Praia", "Palma", "Mueda", "Balama", "Chiure", "Metuge", "Namuno", "Meluco", "Ancuabe", "Ibo"],
            "Niassa": ["Lichinga", "Cuamba", "Mandimba", "Majune", "Sanga", "Mavago", "Mecula", "Marrupa", "Metarica", "Muembe", "Ngauma"]
        };

        // --- ESTADO DO SISTEMA ---
        let professores = JSON.parse(localStorage.getItem('professoresDB')) || [];

        if (professores.length === 0) {
            professores = [
                { nome: "Carlos Mondlane", nivel: "DN2", provAtual: "Maputo Província", distritoAtual: "Matola", tipoLocal: "Dentro da Vila", distancia: 0, provDestino: "Sofala", distDestino: "Beira", condicoes: "-", telefone: "841112233" },
                { nome: "Ana Sitoe", nivel: "DN1", provAtual: "Inhambane", distritoAtual: "Maxixe", tipoLocal: "Fora da Vila", distancia: 50, provDestino: "Maputo Cidade", distDestino: "Maputo Cidade", condicoes: "-", telefone: "859988776" },
                { nome: "João Macheve", nivel: "DN2", provAtual: "Tete", distritoAtual: "Tete", tipoLocal: "Dentro da Vila", distancia: 0, provDestino: "Maputo Província", distDestino: "Matola", condicoes: "Precisa de casa", telefone: "820000000" }
            ];
            localStorage.setItem('professoresDB', JSON.stringify(professores));
        }

        // --- NAVEGAÇÃO ---
        function showView(viewId) {
            document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            
            if(viewId === 'view-list') {
                document.getElementById('filtroProvincia').value = "";
                document.getElementById('resultadosArea').innerHTML = '<div class="no-results">👆 Selecione uma província acima para ver os pedidos disponíveis.</div>';
            } else if (viewId === 'view-form') {
                resetForm();
            }
        }

        function resetForm() {
            document.getElementById('permutaForm').reset();
            
            // Resetar Localização Actual
            document.getElementById('distritoAtual').disabled = true;
            document.getElementById('distritoAtual').innerHTML = '<option value="" disabled selected>Selecione a Província primeiro...</option>';
            document.getElementById('radioDentro').disabled = true;
            document.getElementById('radioFora').disabled = true;
            document.getElementById('radioDentro').checked = false;
            document.getElementById('radioFora').checked = false;
            document.getElementById('distanciaGroup').classList.add('hidden');
            
            // Resetar Destino
            document.getElementById('distDestino').disabled = true;
            document.getElementById('distDestino').innerHTML = '<option value="" disabled selected>Selecione a Província primeiro...</option>';
        }

        // --- INICIALIZAÇÃO DE SELECTS ---
        function inicializarSelects() {
            const selectAtual = document.getElementById('provAtual');
            const selectDestino = document.getElementById('provDestino');            const selectFiltro = document.getElementById('filtroProvincia');

            provinciasMoz.forEach(prov => {
                selectAtual.add(new Option(prov, prov));
                selectDestino.add(new Option(prov, prov));
                selectFiltro.add(new Option(prov, prov));
            });
        }

        // --- LÓGICA DE LOCALIZAÇÃO ACTUAL (CASCATA) ---
        function carregarDistritosAtuais() {
            const provSelecionada = document.getElementById('provAtual').value;
            const selectDistrito = document.getElementById('distritoAtual');
            
            selectDistrito.innerHTML = '<option value="" disabled selected>Selecione o Distrito...</option>';
            selectDistrito.disabled = false;
            
            // Resetar radio buttons
            document.getElementById('radioDentro').disabled = true;
            document.getElementById('radioFora').disabled = true;
            document.getElementById('radioDentro').checked = false;
            document.getElementById('radioFora').checked = false;
            document.getElementById('distanciaGroup').classList.add('hidden');

            if (provSelecionada && distritosPorProvincia[provSelecionada]) {
                distritosPorProvincia[provSelecionada].forEach(dist => {
                    selectDistrito.add(new Option(dist, dist));
                });
            }
        }

        function habilitarLocalizacao() {
            document.getElementById('radioDentro').disabled = false;
            document.getElementById('radioFora').disabled = false;
            document.getElementById('distanciaGroup').classList.add('hidden');
        }

        function toggleDistancia() {
            const radioFora = document.getElementById('radioFora');
            const divDistancia = document.getElementById('distanciaGroup');
            
            if (radioFora.checked) {
                divDistancia.classList.remove('hidden');
            } else {
                divDistancia.classList.add('hidden');
            }
        }

        // --- LÓGICA DE DESTINO (CASCATA) ---
        function carregarDistritosDestino() {            const provSelecionada = document.getElementById('provDestino').value;
            const selectDistrito = document.getElementById('distDestino');
            
            selectDistrito.innerHTML = '<option value="" disabled selected>Selecione o Distrito...</option>';
            
            if (provSelecionada && distritosPorProvincia[provSelecionada]) {
                selectDistrito.disabled = false;
                distritosPorProvincia[provSelecionada].forEach(dist => {
                    selectDistrito.add(new Option(dist, dist));
                });
            } else {
                selectDistrito.disabled = true;
            }
        }

        // --- FUNÇÃO DE FILTRAR LISTA ---
        function filtrarLista() {
            const provFiltro = document.getElementById('filtroProvincia').value;
            const areaResultados = document.getElementById('resultadosArea');
            
            if (!provFiltro) {
                areaResultados.innerHTML = '<div class="no-results">👆 Selecione uma província acima para ver os pedidos disponíveis.</div>';
                return;
            }

            const filtrados = professores.filter(p => p.provDestino === provFiltro);

            if (filtrados.length === 0) {
                areaResultados.innerHTML = `
                    <div class="no-results">
                        <h3>😕 Sem resultados</h3>
                        <p>Não há professores registados que queiram ir para <strong>${provFiltro}</strong>.</p>
                    </div>`;
                return;
            }

            let html = `<h3 style="margin-bottom:15px;">📋 Professores interessados em ${provFiltro}:</h3>`;
            
            filtrados.forEach(p => {
                let localInfo = `${p.distritoAtual} (${p.tipoLocal})`;
                if(p.tipoLocal === 'Fora da Vila') localInfo += ` - ${p.distancia}km`;

                html += `
                <div class="teacher-item">
                    <h3>${p.nome} <span class="tag">${p.nivel}</span></h3>
                    <div><strong>📍 Actualmente em:</strong> ${p.provAtual} > ${localInfo}</div>
                    <div><strong>🚀 Quer ir para:</strong> ${p.distDestino}</div>
                    <div style="font-size:0.9em; color:#666; margin-top:5px;"><em>Obs: ${p.condicoes || 'Sem condições'}</em></div>
                    <div style="margin-top:10px; font-weight:bold; color:var(--primary);">📞 ${p.telefone}</div>
                </div>`;            });

            areaResultados.innerHTML = html;
        }

        // --- LÓGICA DE REGISTO ---
        document.getElementById('permutaForm').addEventListener('submit', function(e) {
            e.preventDefault();

            // Obter valor do radio button selecionado
            const tipoLocal = document.querySelector('input[name="localizacao"]:checked');
            
            if (!tipoLocal) {
                alert("Por favor, selecione a localização da escola (Dentro ou Fora da Vila)");
                return;
            }

            const novoProfessor = {
                nome: document.getElementById('nome').value,
                nivel: document.getElementById('nivel').value,
                provAtual: document.getElementById('provAtual').value,
                distritoAtual: document.getElementById('distritoAtual').value,
                tipoLocal: tipoLocal.value,
                distancia: document.getElementById('distancia').value || 0,
                provDestino: document.getElementById('provDestino').value,
                distDestino: document.getElementById('distDestino').value,
                condicoes: document.getElementById('condicoes').value,
                telefone: document.getElementById('telefone').value
            };

            // Verificar compatibilidade (Mesma Província Destino + Mesmo Nível)
            const matches = professores.filter(p => 
                p.provDestino === novoProfessor.provAtual && 
                p.nivel === novoProfessor.nivel
            );

            professores.push(novoProfessor);
            localStorage.setItem('professoresDB', JSON.stringify(professores));

            if (matches.length > 0) {
                let msg = "✅ PERMUTA POSSÍVEL!\n\nEncontrámos " + matches.length + " professor(es) compatível(eis):\n\n";
                matches.forEach(m => {
                    msg += `👤 ${m.nome} (${m.nivel})\n   Quer ir para: ${m.provDestino} (${m.distDestino})\n   📞 ${m.telefone}\n\n`;
                });
                alert(msg);
            } else {
                alert("Registo efetuado! ⚠️ Ainda não há ninguém com o seu nível (DN) a pedir permuta para " + novoProfessor.provAtual + ".");
            }

            resetForm();            showView('view-list');
        });

        function limparDados() {
            if(confirm("Apagar todos os dados?")) {
                localStorage.removeItem('professoresDB');
                location.reload();
            }
        }

        // Iniciar
        inicializarSelects();
    </script>
</body>
</html>
