<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plano de Aula MZ</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container { width: 100%; max-width: 400px; }
        .tela { display: none; }
        .tela.ativa { display: block; }
        .card {
            background: white;
            border-radius: 20px;
            padding: 35px 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
        }
        .logo { font-size: 48px; margin-bottom: 20px; }
        h2 { margin-bottom: 15px; color: #333; }
        .subtitulo { color: #666; margin-bottom: 25px; font-size: 14px; }
        #googleButton {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }
        .info-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
            text-align: left;
        }
        .campo { margin-bottom: 15px; }
        .campo label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        .campo input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-sair { background: #e74c3c; margin-top: 20px; }
        .radio-group { display: flex; gap: 20px; margin-top: 8px; justify-content: center; }
        .erro { color: red; margin-top: 10px; font-size: 13px; }
    </style>
</head>
<body>
    <div class="container">
        
        <!-- TELA DE LOGIN -->
        <div id="telaLogin" class="tela ativa">
            <div class="card">
                <div class="logo">📚</div>
                <h2>Plano de Aula MZ</h2>
                <p class="subtitulo">Clique no botão e selecione sua conta</p>
                <div id="googleButton"></div>
            </div>
        </div>

        <!-- TELA DE CADASTRO -->
        <div id="telaCadastro" class="tela">
            <div class="card">
                <h2>Complete seu cadastro</h2>
                <div class="info-card">
                    <p>✅ <strong>Email:</strong> <span id="emailSelecionado"></span></p>
                </div>
                <div class="campo">
                    <label>🏫 Nome da Escola</label>
                    <input type="text" id="nomeEscola" placeholder="Ex: Escola Primária">
                </div>
                <div class="campo">
                    <label>📱 Participar do WhatsApp?</label>
                    <div class="radio-group">
                        <label><input type="radio" name="whatsapp" value="sim"> ✅ Sim</label>
                        <label><input type="radio" name="whatsapp" value="nao" checked> ❌ Não</label>
                    </div>
                </div>
                <button onclick="completarCadastro()">Salvar</button>
                <div id="erroCadastro" class="erro"></div>
            </div>
        </div>

        <!-- TELA PRINCIPAL -->
        <div id="telaDashboard" class="tela">
            <div class="card">
                <h2>Bem-vindo!</h2>
                <div class="info-card">
                    <p>📧 <strong>Email:</strong> <span id="userEmail"></span></p>
                    <p>🏫 <strong>Escola:</strong> <span id="userEscola"></span></p>
                    <p>📱 <strong>WhatsApp:</strong> <span id="userWhatsapp"></span></p>
                </div>
                <button onclick="sair()" class="btn-sair">Sair</button>
            </div>
        </div>

    </div>

    <script>
        // ⚠️ COLOQUE SEU CLIENT ID AQUI ⚠️
        const CLIENT_ID = 'SEU_CLIENT_ID_AQUI.apps.googleusercontent.com';
        
        let emailTemp = null;
        
        // Banco de dados
        function getUsuarios() { return JSON.parse(localStorage.getItem('usuarios') || '[]'); }
        function salvarUsuarios(u) { localStorage.setItem('usuarios', JSON.stringify(u)); }
        function getLogado() { return JSON.parse(localStorage.getItem('logado') || 'null'); }
        function setLogado(u) { localStorage.setItem('logado', JSON.stringify(u)); }
        function limparLogado() { localStorage.removeItem('logado'); }
        
        function mostrarTela(id) {
            document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
            document.getElementById(id).classList.add('ativa');
        }
        
        // Inicializar Google One Tap
        function initGoogle() {
            if (!CLIENT_ID || CLIENT_ID === 'SEU_CLIENT_ID_AQUI.apps.googleusercontent.com') {
                console.error('⚠️ Coloque seu CLIENT_ID do Google no código!');
                document.getElementById('googleButton').innerHTML = 
                    '<p style="color:red; padding:20px;">⚠️ Configurar Client ID do Google</p>';
                return;
            }
            
            google.accounts.id.initialize({
                client_id: CLIENT_ID,
                callback: handleCredential,
                auto_select: false
            });
            
            google.accounts.id.renderButton(
                document.getElementById('googleButton'),
                { theme: 'outline', size: 'large', width: '100%' }
            );
            
            google.accounts.id.prompt();
        }
        
        function handleCredential(response) {
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            const email = payload.email;
            
            emailTemp = email;
            
            const usuarios = getUsuarios();
            const existente = usuarios.find(u => u.email === email);
            
            if (existente) {
                setLogado(existente);
                mostrarDashboard(existente);
            } else {
                document.getElementById('emailSelecionado').textContent = email;
                mostrarTela('telaCadastro');
            }
        }
        
        function completarCadastro() {
            const escola = document.getElementById('nomeEscola').value.trim();
            const whatsapp = document.querySelector('input[name="whatsapp"]:checked').value;
            const erro = document.getElementById('erroCadastro');
            
            if (!escola) { erro.textContent = 'Digite o nome da escola'; return; }
            
            const novo = {
                email: emailTemp,
                escola: escola,
                whatsapp: whatsapp === 'sim' ? '✅ Sim' : '❌ Não',
                data: new Date().toLocaleDateString()
            };
            
            const usuarios = getUsuarios();
            usuarios.push(novo);
            salvarUsuarios(usuarios);
            setLogado(novo);
            mostrarDashboard(novo);
        }
        
        function mostrarDashboard(u) {
            document.getElementById('userEmail').textContent = u.email;
            document.getElementById('userEscola').textContent = u.escola;
            document.getElementById('userWhatsapp').textContent = u.whatsapp;
            mostrarTela('telaDashboard');
        }
        
        function sair() {
            limparLogado();
            mostrarTela('telaLogin');
            setTimeout(() => google.accounts.id.prompt(), 100);
        }
        
        function verificarSessao() {
            const logado = getLogado();
            if (logado) mostrarDashboard(logado);
            else initGoogle();
        }
        
        verificarSessao();
    </script>
</body>
</html>
